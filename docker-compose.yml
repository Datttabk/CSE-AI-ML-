version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eduinsight-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: eduinsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduinsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduinsight-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/eduinsight
      - SECRET_KEY=supersecretkeyforjwttokeneduinsight
      - PLAYWRIGHT_HEADLESS=True
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/VTU_Results_All.csv:/workspace/VTU_Results_All.csv

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduinsight-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
